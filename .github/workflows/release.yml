name: Release skill zips

on:
  push:
    tags:
      - "*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build per-skill zips
        run: ./build.sh

      - name: Build combined all-skills.zip
        run: |
          cd dist
          zip -q -X all-skills.zip *.zip
          echo "Bundled $(unzip -l all-skills.zip | grep -c '\.zip$') skill zip(s) into all-skills.zip"

      - name: Upload build artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: skill-zips
          path: dist/*.zip

      - name: Publish GitHub release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.zip --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" dist/*.zip \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes \
              --notes "Skill zips built from this tag. Each \`<skill>.zip\` can be installed individually, or grab \`all-skills.zip\` for every skill bundled together."
          fi
